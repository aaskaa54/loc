<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#050506">
<title>Loïc Dashboard</title>
<script src="lock.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="sync.js" defer></script>
<script src="topbar.js" defer></script>
<style>
:root {
  --text-primary: #FAFAFA;
  --text-secondary: #B8B6B0;
  --text-tertiary: #76746E;
  --success: #6BE3A4;
  --warning: #F2C063;
  --danger: #FF6B6B;
  --font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
}

* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: #050506;
  color: var(--text-secondary);
  font-family: var(--font);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  -webkit-text-size-adjust: 100%;
}
body {
  min-height: 100vh;
  position: relative;
  overflow-x: hidden;
  padding: max(28px, env(safe-area-inset-top)) 20px 60px;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(circle at 75% 12%, rgba(107, 227, 164, 0.13), transparent 45%),
    radial-gradient(circle at 20% 88%, rgba(125, 211, 252, 0.09), transparent 50%);
  filter: blur(40px);
  pointer-events: none;
  z-index: -2;
  animation: drift 36s ease-in-out infinite alternate;
}
body::after {
  content: '';
  position: fixed; inset: 0;
  background-image: radial-gradient(rgba(255,255,255,0.014) 1px, transparent 1px);
  background-size: 3px 3px;
  pointer-events: none;
  z-index: -1;
}
@keyframes drift {
  0%   { transform: translate3d(0, 0, 0); }
  100% { transform: translate3d(-22px, 14px, 0); }
}

.page {
  max-width: 1100px;
  margin: 0 auto;
}

.dash-title {
  margin: 0 0 24px;
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.025em;
  background: linear-gradient(180deg, #FFFFFF 0%, #C7C4BC 120%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  color: transparent;
}
@media (max-width: 480px) { .dash-title { font-size: 22px; } }

/* ===== Bento Grid ===== */
.bento-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-auto-rows: 168px;
  grid-auto-flow: dense;
  gap: 14px;
}

.bento-tile {
  position: relative;
  display: flex;
  flex-direction: column;
  padding: 18px 20px 16px;
  border-radius: 18px;
  background: linear-gradient(180deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.02) 100%);
  border: 1px solid rgba(255,255,255,0.08);
  backdrop-filter: blur(24px) saturate(1.2);
  -webkit-backdrop-filter: blur(24px) saturate(1.2);
  text-decoration: none;
  color: var(--text-primary);
  transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
  overflow: hidden;
}
.bento-tile:hover {
  transform: translateY(-3px);
  border-color: color-mix(in srgb, var(--accent) 35%, transparent);
  box-shadow: 0 8px 32px rgba(0,0,0,0.28);
}
.bento-tile.big {
  grid-column: span 2;
  grid-row: span 2;
}
.bento-tile.wide {
  grid-column: span 2;
}

.tile-num {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  color: var(--text-tertiary);
  letter-spacing: 0.06em;
}
.tile-emoji {
  position: absolute;
  top: 16px;
  right: 18px;
  font-size: 28px;
  line-height: 1;
  filter: drop-shadow(0 0 10px var(--accent));
  opacity: 0.9;
}
.bento-tile.big .tile-emoji {
  font-size: 44px;
  top: 20px;
  right: 22px;
}
.tile-spacer { flex: 1; }
.tile-title {
  font-size: 17px;
  font-weight: 700;
  color: var(--text-primary);
  letter-spacing: -0.02em;
  margin-bottom: 6px;
}
.bento-tile.big .tile-title { font-size: 22px; }
.tile-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.tile-sub {
  font-size: 12px;
  color: var(--text-tertiary);
}
.tile-arrow {
  font-size: 15px;
  font-weight: 700;
  color: var(--accent);
  transition: transform 0.18s ease;
  flex-shrink: 0;
}
.bento-tile:hover .tile-arrow { transform: translateX(4px); }

/* ===== Responsive ===== */
@media (max-width: 720px) {
  .bento-grid {
    grid-template-columns: repeat(2, 1fr);
  }
  .bento-tile.big {
    grid-row: span 1;
  }
}
@media (max-width: 440px) {
  .bento-grid {
    grid-template-columns: 1fr;
    grid-auto-rows: 140px;
  }
  .bento-tile.big,
  .bento-tile.wide {
    grid-column: span 1;
    grid-row: span 1;
  }
}

/* ===== Page header row ===== */
.page-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
}
.page-header .dash-title { margin: 0; }

/* ===== Gear button ===== */
.gear-btn {
  width: 42px; height: 42px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.10);
  background: rgba(255,255,255,0.04);
  color: var(--text-secondary);
  font-size: 20px; line-height: 1;
  cursor: pointer;
  display: inline-flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: background 0.15s, transform 0.20s;
  -webkit-tap-highlight-color: transparent;
}
.gear-btn:hover { background: rgba(255,255,255,0.08); }
.gear-btn:active { transform: rotate(28deg) scale(0.92); }

/* ===== Modal backdrop ===== */
.modal-bg {
  display: none;
  position: fixed; inset: 0; z-index: 50;
  background: rgba(0,0,0,0.65);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-bg.show { display: flex; }

/* ===== Modal card ===== */
.modal {
  background: linear-gradient(180deg, rgba(30,30,33,0.98) 0%, rgba(17,17,20,0.98) 100%);
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: 20px;
  width: 100%;
  max-width: 420px;
  max-height: 88vh;
  overflow-y: auto;
  padding: 24px;
  overscroll-behavior: contain;
}
.modal-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 22px;
}
.modal-title {
  font-size: 18px; font-weight: 700;
  color: var(--text-primary); letter-spacing: -0.02em;
}
.modal-close {
  width: 32px; height: 32px;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.04);
  color: var(--text-secondary);
  font-size: 16px; line-height: 1;
  cursor: pointer;
  display: inline-flex; align-items: center; justify-content: center;
  transition: background 0.15s;
}
.modal-close:hover { background: rgba(255,255,255,0.10); }

/* ===== Form fields ===== */
.st-field { margin-bottom: 16px; }
.st-label {
  display: block;
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.07em; text-transform: uppercase;
  color: var(--text-tertiary);
  margin-bottom: 8px;
}
.st-input-row { display: flex; gap: 8px; align-items: center; }
.st-input {
  flex: 1; min-width: 0;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: 10px;
  color: var(--text-primary);
  font-family: var(--font); font-size: 15px;
  padding: 10px 12px;
  outline: none;
  transition: border-color 0.15s;
  -webkit-appearance: none;
}
.st-input:focus { border-color: rgba(255,255,255,0.24); }
.st-input::placeholder { color: var(--text-tertiary); }
.st-ftin { display: flex; gap: 6px; flex: 1; min-width: 0; }
.st-ftin .st-input { flex: 1; }

/* segmented toggle */
.st-seg {
  display: flex;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: 10px;
  overflow: hidden; flex-shrink: 0;
}
.st-seg button {
  flex: 1;
  padding: 10px 12px;
  border: none; background: none;
  color: var(--text-tertiary);
  font-family: var(--font); font-size: 13px; font-weight: 600;
  cursor: pointer; white-space: nowrap;
  transition: background 0.15s, color 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.st-seg button.active {
  background: rgba(255,255,255,0.12);
  color: var(--text-primary);
}

/* save row */
.st-save-row {
  margin-top: 22px;
  display: flex; align-items: center; gap: 12px;
}
.st-save {
  flex: 1; padding: 12px;
  border-radius: 12px;
  border: 1px solid rgba(107,227,164,0.30);
  background: linear-gradient(180deg, rgba(107,227,164,0.22) 0%, rgba(107,227,164,0.12) 100%);
  color: var(--text-primary);
  font-family: var(--font); font-size: 15px; font-weight: 700;
  cursor: pointer;
  transition: background 0.15s, transform 0.10s;
}
.st-save:hover { background: linear-gradient(180deg, rgba(107,227,164,0.32) 0%, rgba(107,227,164,0.20) 100%); }
.st-save:active { transform: scale(0.98); }
.st-saved {
  font-size: 13px; font-weight: 600;
  color: var(--success);
  opacity: 0; transition: opacity 0.3s ease;
  white-space: nowrap;
}
.st-saved.show { opacity: 1; }

/* divider */
.st-divider {
  border: none;
  border-top: 1px solid rgba(255,255,255,0.08);
  margin: 22px 0;
}

/* ===== WHOOP card ===== */
.whoop-card {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 14px;
  padding: 16px;
}
.whoop-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 2px;
}
.whoop-status-row { display: flex; align-items: center; gap: 8px; }
.whoop-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--text-tertiary); flex-shrink: 0;
}
.whoop-dot.connected {
  background: var(--success);
  box-shadow: 0 0 6px rgba(107,227,164,0.55);
}
.whoop-status-text {
  font-size: 14px; font-weight: 700;
  color: var(--text-primary);
}
.whoop-sync-time {
  font-size: 12px; color: var(--text-tertiary);
  margin: 4px 0 12px;
  min-height: 16px;
}
.whoop-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px; margin-bottom: 12px;
}
.whoop-stat {
  background: rgba(255,255,255,0.04);
  border-radius: 10px;
  padding: 10px 8px; text-align: center;
}
.whoop-stat-val {
  display: block;
  font-family: var(--font-mono);
  font-size: 18px; font-weight: 700;
  color: var(--text-primary);
}
.whoop-stat-lbl {
  display: block;
  font-size: 10px; text-transform: uppercase;
  letter-spacing: 0.05em; color: var(--text-tertiary);
  margin-top: 2px;
}
.whoop-btn {
  display: block; width: 100%;
  padding: 10px; text-align: center;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.12);
  background: rgba(255,255,255,0.05);
  color: var(--text-secondary);
  font-family: var(--font); font-size: 13px; font-weight: 600;
  cursor: pointer; text-decoration: none;
  transition: background 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.whoop-btn:hover { background: rgba(255,255,255,0.10); }
.whoop-btn:disabled { opacity: 0.5; cursor: default; }
</style>
</head>
<body>
<div class="page">
  <div class="page-header">
    <h1 class="dash-title">Dashboard</h1>
    <button class="gear-btn" id="gearBtn" aria-label="Settings" type="button">⚙️</button>
  </div>

  <div class="bento-grid">

    <a href="main.html" class="bento-tile big" style="--accent:#6BE3A4">
      <span class="tile-num">·01</span>
      <span class="tile-emoji">🏠</span>
      <span class="tile-spacer"></span>
      <div class="tile-title">Main</div>
      <div class="tile-footer">
        <span class="tile-sub">Goals &amp; daily plan</span>
        <span class="tile-arrow">→</span>
      </div>
    </a>

    <a href="gym.html" class="bento-tile wide" style="--accent:#7DD3FC">
      <span class="tile-num">·02</span>
      <span class="tile-emoji">💪</span>
      <span class="tile-spacer"></span>
      <div class="tile-title">Fitness</div>
      <div class="tile-footer">
        <span class="tile-sub">Workouts, splits, sessions</span>
        <span class="tile-arrow">→</span>
      </div>
    </a>

    <a href="health.html" class="bento-tile" style="--accent:#A7F3D0">
      <span class="tile-num">·03</span>
      <span class="tile-emoji">💊</span>
      <span class="tile-spacer"></span>
      <div class="tile-title">Health</div>
      <div class="tile-footer">
        <span class="tile-sub">Supplements &amp; vitals</span>
        <span class="tile-arrow">→</span>
      </div>
    </a>

    <a href="po-water.html" class="bento-tile" style="--accent:#60A5FA">
      <span class="tile-num">·04</span>
      <span class="tile-emoji">💧</span>
      <span class="tile-spacer"></span>
      <div class="tile-title">Water</div>
      <div class="tile-footer">
        <span class="tile-sub">Hydration</span>
        <span class="tile-arrow">→</span>
      </div>
    </a>

    <a href="finance.html" class="bento-tile wide" style="--accent:#F2C063">
      <span class="tile-num">·05</span>
      <span class="tile-emoji">📊</span>
      <span class="tile-spacer"></span>
      <div class="tile-title">Finance</div>
      <div class="tile-footer">
        <span class="tile-sub">Net worth &amp; spending</span>
        <span class="tile-arrow">→</span>
      </div>
    </a>

  </div>
</div>

<!-- ===== Settings Modal ===== -->
<div class="modal-bg" id="settingsModalBg">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-head">
      <span class="modal-title" id="modalTitle">Your Data</span>
      <button class="modal-close" id="settingsClose" aria-label="Close" type="button">✕</button>
    </div>

    <!-- Height -->
    <div class="st-field">
      <label class="st-label">Height</label>
      <div class="st-input-row">
        <span id="stHeightCmWrap" style="flex:1;min-width:0;display:flex">
          <input class="st-input" id="stHeightCm" type="number" min="100" max="250" placeholder="175">
        </span>
        <span id="stHeightFtInWrap" style="flex:1;min-width:0;display:none">
          <span class="st-ftin">
            <input class="st-input" id="stHeightFt" type="number" min="3" max="8" placeholder="5">
            <input class="st-input" id="stHeightIn" type="number" min="0" max="11" placeholder="9">
          </span>
        </span>
        <div class="st-seg" id="heightSeg">
          <button type="button" data-unit="cm" class="active">cm</button>
          <button type="button" data-unit="ftin">ft/in</button>
        </div>
      </div>
    </div>

    <!-- Weight -->
    <div class="st-field">
      <label class="st-label">Weight</label>
      <div class="st-input-row">
        <input class="st-input" id="stWeight" type="number" min="20" max="300" placeholder="75">
        <div class="st-seg" id="weightSeg">
          <button type="button" data-unit="kg" class="active">kg</button>
          <button type="button" data-unit="lb">lb</button>
        </div>
      </div>
    </div>

    <!-- Age -->
    <div class="st-field">
      <label class="st-label">Age</label>
      <input class="st-input" id="stAge" type="number" min="10" max="120" placeholder="25">
    </div>

    <!-- Sex -->
    <div class="st-field">
      <label class="st-label">Sex</label>
      <div class="st-seg" id="sexSeg" style="width:100%">
        <button type="button" data-sex="m" class="active">Male</button>
        <button type="button" data-sex="f">Female</button>
      </div>
    </div>

    <!-- Active hours -->
    <div class="st-field">
      <label class="st-label">Active hours / week</label>
      <input class="st-input" id="stActivity" type="number" min="0" max="40" step="0.5" placeholder="5">
    </div>

    <div class="st-save-row">
      <button class="st-save" id="stSave" type="button">Save</button>
      <span class="st-saved" id="stSaved">Saved ✓</span>
    </div>

    <hr class="st-divider">

    <!-- WHOOP card -->
    <div class="whoop-card">
      <div class="whoop-head">
        <div class="whoop-status-row">
          <span class="whoop-dot" id="whoopDot"></span>
          <span class="whoop-status-text" id="whoopStatusText">Not connected</span>
        </div>
      </div>
      <div class="whoop-sync-time" id="whoopSyncTime"></div>
      <div class="whoop-stats" id="whoopStats" style="display:none">
        <div class="whoop-stat">
          <span class="whoop-stat-val" id="whoopRecovery">—</span>
          <span class="whoop-stat-lbl">Recovery</span>
        </div>
        <div class="whoop-stat">
          <span class="whoop-stat-val" id="whoopSleep">—</span>
          <span class="whoop-stat-lbl">Sleep</span>
        </div>
        <div class="whoop-stat">
          <span class="whoop-stat-val" id="whoopRestHr">—</span>
          <span class="whoop-stat-lbl">Rest HR</span>
        </div>
      </div>
      <button class="whoop-btn" id="whoopSyncBtn" type="button">Connect on Health page</button>
    </div>

  </div>
</div>

<script>
(function () {
  'use strict';

  const modalBg   = document.getElementById('settingsModalBg');
  const gearBtn   = document.getElementById('gearBtn');
  const closeBtn  = document.getElementById('settingsClose');

  function openModal() { loadFormFromStorage(); modalBg.classList.add('show'); autoSyncWhoop(); }
  function closeModal() { modalBg.classList.remove('show'); }

  gearBtn.addEventListener('click', openModal);
  closeBtn.addEventListener('click', closeModal);
  modalBg.addEventListener('click', function (e) { if (e.target === modalBg) closeModal(); });
  document.addEventListener('keydown', function (e) { if (e.key === 'Escape' && modalBg.classList.contains('show')) closeModal(); });

  // ---- Default state mirrors topbar.js ----
  function defaultState() {
    return {
      unit: 'bottle', bottleMl: 500, glassMl: 250, weightUnit: 'kg',
      profile: { weightKg: 75, age: 25, sex: 'm', activityHrsPerWeek: 5,
                 heightCm: 175, heightUnit: 'cm' },
      caffeineMgPerDay: 200, substances: [], logs: {}
    };
  }
  function loadWaterState() {
    try {
      var s = JSON.parse(localStorage.getItem('po_water_v1'));
      if (s && typeof s === 'object') return s;
    } catch (e) {}
    return defaultState();
  }

  // ---- Unit converters ----
  function cmToFtIn(cm) {
    var totalIn = cm / 2.54;
    var ft = Math.floor(totalIn / 12);
    var inches = Math.round(totalIn % 12);
    if (inches === 12) { ft++; inches = 0; }
    return { ft: ft, inches: inches };
  }
  function ftInToCm(ft, inches) {
    return Math.round(((+ft * 12) + +inches) * 2.54);
  }
  function kgToLb(kg) { return Math.round(kg * 2.20462); }
  function lbToKg(lb) { return parseFloat((lb / 2.20462).toFixed(1)); }

  var heightUnit = 'cm';
  var weightUnit = 'kg';

  function setHeightSeg(unit) {
    heightUnit = unit;
    document.querySelectorAll('#heightSeg button').forEach(function (b) {
      b.classList.toggle('active', b.dataset.unit === unit);
    });
    document.getElementById('stHeightCmWrap').style.display   = unit === 'cm'   ? '' : 'none';
    document.getElementById('stHeightFtInWrap').style.display = unit === 'ftin' ? '' : 'none';
  }
  function setWeightSeg(unit) {
    weightUnit = unit;
    document.querySelectorAll('#weightSeg button').forEach(function (b) {
      b.classList.toggle('active', b.dataset.unit === unit);
    });
  }
  function setSexSeg(sex) {
    document.querySelectorAll('#sexSeg button').forEach(function (b) {
      b.classList.toggle('active', b.dataset.sex === sex);
    });
  }

  function loadFormFromStorage() {
    var s = loadWaterState();
    var p = s.profile || {};

    heightUnit = (p.heightUnit === 'ftin') ? 'ftin' : 'cm';
    setHeightSeg(heightUnit);
    if (heightUnit === 'ftin') {
      var ftin = cmToFtIn(p.heightCm || 175);
      document.getElementById('stHeightFt').value = ftin.ft;
      document.getElementById('stHeightIn').value = ftin.inches;
    } else {
      document.getElementById('stHeightCm').value = p.heightCm || 175;
    }

    weightUnit = s.weightUnit || 'kg';
    setWeightSeg(weightUnit);
    document.getElementById('stWeight').value = weightUnit === 'lb'
      ? kgToLb(p.weightKg || 75)
      : (p.weightKg || 75);

    document.getElementById('stAge').value = p.age != null ? p.age : '';
    setSexSeg(p.sex || 'm');
    document.getElementById('stActivity').value = p.activityHrsPerWeek != null ? p.activityHrsPerWeek : '';
  }

  // Height toggle — convert displayed value in place
  document.getElementById('heightSeg').addEventListener('click', function (e) {
    var btn = e.target.closest('button');
    if (!btn) return;
    var newUnit = btn.dataset.unit;
    if (newUnit === heightUnit) return;
    if (newUnit === 'ftin') {
      var cm = parseFloat(document.getElementById('stHeightCm').value) || 175;
      var ftin = cmToFtIn(cm);
      document.getElementById('stHeightFt').value = ftin.ft;
      document.getElementById('stHeightIn').value = ftin.inches;
    } else {
      var ft = parseFloat(document.getElementById('stHeightFt').value) || 5;
      var inches = parseFloat(document.getElementById('stHeightIn').value) || 9;
      document.getElementById('stHeightCm').value = ftInToCm(ft, inches);
    }
    setHeightSeg(newUnit);
  });

  // Weight toggle — convert displayed value in place
  document.getElementById('weightSeg').addEventListener('click', function (e) {
    var btn = e.target.closest('button');
    if (!btn) return;
    var newUnit = btn.dataset.unit;
    if (newUnit === weightUnit) return;
    var cur = parseFloat(document.getElementById('stWeight').value);
    if (!isNaN(cur)) {
      document.getElementById('stWeight').value = newUnit === 'lb' ? kgToLb(cur) : lbToKg(cur);
    }
    setWeightSeg(newUnit);
  });

  // Sex toggle
  document.getElementById('sexSeg').addEventListener('click', function (e) {
    var btn = e.target.closest('button');
    if (btn) setSexSeg(btn.dataset.sex);
  });

  // Save
  document.getElementById('stSave').addEventListener('click', function () {
    var s = loadWaterState();
    if (!s.profile) s.profile = {};

    if (heightUnit === 'ftin') {
      s.profile.heightCm = ftInToCm(
        document.getElementById('stHeightFt').value || 5,
        document.getElementById('stHeightIn').value || 9
      );
    } else {
      var hVal = parseFloat(document.getElementById('stHeightCm').value);
      if (!isNaN(hVal)) s.profile.heightCm = hVal;
    }
    s.profile.heightUnit = heightUnit;

    var wVal = parseFloat(document.getElementById('stWeight').value);
    if (!isNaN(wVal)) s.profile.weightKg = weightUnit === 'lb' ? lbToKg(wVal) : wVal;
    s.weightUnit = weightUnit;

    var age = parseInt(document.getElementById('stAge').value, 10);
    if (!isNaN(age)) s.profile.age = age;

    var activeSexBtn = document.querySelector('#sexSeg button.active');
    if (activeSexBtn) s.profile.sex = activeSexBtn.dataset.sex;

    var activity = parseFloat(document.getElementById('stActivity').value);
    if (!isNaN(activity)) s.profile.activityHrsPerWeek = activity;

    try { localStorage.setItem('po_water_v1', JSON.stringify(s)); } catch (e) {}

    var savedEl = document.getElementById('stSaved');
    savedEl.classList.add('show');
    clearTimeout(savedEl._t);
    savedEl._t = setTimeout(function () { savedEl.classList.remove('show'); }, 1800);
  });

  // ---- WHOOP ----
  function whoopTokens() {
    try { return JSON.parse(localStorage.getItem('whoop_tokens_v1')); } catch (e) { return null; }
  }
  function fmtAgo(ts) {
    if (!ts) return '';
    var mins = Math.round((Date.now() - new Date(ts).getTime()) / 60000);
    if (mins < 1) return 'just now';
    if (mins < 60) return mins + ' min ago';
    var hrs = Math.floor(mins / 60);
    return hrs + 'h ' + (mins % 60) + 'min ago';
  }

  function renderWhoopConnected() {
    document.getElementById('whoopDot').classList.add('connected');
    document.getElementById('whoopStatusText').textContent = 'Connected';
    var btn = document.getElementById('whoopSyncBtn');
    btn.textContent = 'Sync now';
    btn.disabled = false;
    btn.onclick = function (e) { e.preventDefault(); syncWhoop(); };
  }
  function renderWhoopDisconnected() {
    document.getElementById('whoopDot').classList.remove('connected');
    document.getElementById('whoopStatusText').textContent = 'Not connected';
    document.getElementById('whoopSyncTime').textContent = '';
    document.getElementById('whoopStats').style.display = 'none';
    var btn = document.getElementById('whoopSyncBtn');
    btn.textContent = 'Connect on Health page';
    btn.disabled = false;
    btn.onclick = function () { window.location.href = 'health.html'; };
  }
  function applyWhoopStats(data) {
    if (data.recovery != null) document.getElementById('whoopRecovery').textContent = data.recovery + '%';
    if (data.sleep    != null) document.getElementById('whoopSleep').textContent    = data.sleep    + '%';
    if (data.restHr   != null) document.getElementById('whoopRestHr').textContent   = data.restHr;
    document.getElementById('whoopStats').style.display = '';
    var ts = data.syncedAt || new Date().toISOString();
    try { localStorage.setItem('whoop_last_sync', ts); } catch (e) {}
    try { localStorage.setItem('whoop_stats_v1', JSON.stringify(data)); } catch (e) {}
    document.getElementById('whoopSyncTime').textContent = 'Last synced ' + fmtAgo(ts);
  }

  async function syncWhoop() {
    var btn = document.getElementById('whoopSyncBtn');
    btn.textContent = 'Syncing…'; btn.disabled = true;
    try {
      var res = await fetch('/api/whoop-data');
      if (res.status === 401) {
        await fetch('/api/whoop-refresh', { method: 'POST' });
        res = await fetch('/api/whoop-data');
      }
      if (res.ok) {
        var data = await res.json();
        applyWhoopStats({
          recovery: data.recovery,
          sleep:    data.sleep,
          restHr:   data.rest_hr != null ? data.rest_hr : data.restHr,
          syncedAt: new Date().toISOString()
        });
      }
    } catch (e) {}
    btn.textContent = 'Sync now'; btn.disabled = false;
  }

  function autoSyncWhoop() {
    var tokens = whoopTokens();
    if (!tokens) { renderWhoopDisconnected(); return; }
    renderWhoopConnected();
    var lastSync = localStorage.getItem('whoop_last_sync');
    document.getElementById('whoopSyncTime').textContent = lastSync
      ? 'Last synced ' + fmtAgo(lastSync) : 'Never synced';
    try {
      var cached = JSON.parse(localStorage.getItem('whoop_stats_v1'));
      if (cached) applyWhoopStats(cached);
    } catch (e) {}
    syncWhoop();
  }

})();
</script>
</body>
</html>
